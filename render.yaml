services:
  - type: web
    name: appsec-workbench-api
    runtime: node
    plan: starter
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: API_DATABASE_URL
        value: file:/var/data/appsec-workbench.db
      - key: CORS_ORIGIN
        value: https://appsec-workbench-web.onrender.com
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: appsec-workbench-web
    runtime: static
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://appsec-workbench-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
